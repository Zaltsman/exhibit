#!KAMAILIO

# -------------------------------------------------------
# Art Exhibit SIP Server Configuration
# Kamailio version: 6.0.1
#
# Architecture:
# - Pi eth0: 192.168.10.1 (switch network)
# - Phone: 192.168.10.2 (switch network)
# - Audio: physical cable Pi USB adapter → phone headset
# - Kamailio handles: registration, call detection, keypresses
# - Python handles: video playback
#
# Event flow:
# Phone dials number → Kamailio runs handle_event.py keypress N
# Phone hangs up → Kamailio runs handle_event.py call_ended
# -------------------------------------------------------

listen=udp:192.168.10.1:5060
listen=tcp:192.168.10.1:5060

memdbg=5
memlog=5
log_facility=LOG_LOCAL0
children=4

# ------------------
# Module loading
# ------------------

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "dialog.so"
loadmodule "exec.so"
loadmodule "jsonrpcs.so"
loadmodule "ctl.so"

# ------------------
# Module settings
# ------------------

modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "default_expires", 3600)

modparam("usrloc", "db_mode", 0)

modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

modparam("dialog", "enable_stats", 0)

# exec — how long to wait for the Python script to run (seconds)
modparam("exec", "time_to_kill", 5)

# ------------------
# Main routing logic
# ------------------

request_route {

    # Drop requests forwarded too many times
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Drop malformed SIP messages
    if (!sanity_check("1511", "7")) {
        xlog("L_WARN", "Dropped malformed SIP from $si:$sp\n");
        exit;
    }

    # Only accept messages from the phone
    # Everything on this network is trusted but this adds a safety check
    if ($si != "192.168.10.2") {
        xlog("L_WARN", "Rejected SIP from unknown source $si\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # Stay in call path so we receive BYE on hangup
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # ----------------------------------------
    # REGISTER — phone registers on boot
    # and periodically to stay connected
    # ----------------------------------------
    if (is_method("REGISTER")) {
        xlog("L_INFO", "Phone registering from $si\n");
        if (!save("location")) {
            xlog("L_ERR", "Failed to save registration\n");
            sl_reply_error();
        }
        xlog("L_INFO", "Phone registered successfully\n");
        exit;
    }

    # ----------------------------------------
    # INVITE — participant dials a number
    # $rU contains the number that was dialed
    # e.g. INVITE sip:3@192.168.10.1 means key 3 was pressed
    # ----------------------------------------
    if (is_method("INVITE")) {
        xlog("L_INFO", "INVITE — number dialed: $rU\n");

        # Track this as a dialog so we detect BYE reliably
        dlg_manage();

        # Answer the call immediately
        sl_send_reply("200", "OK");

        # Tell Python which key was pressed by running handle_event.py
        # The & runs it in background so Kamailio doesn't wait for it
        exec_cmd("python3 /home/pi/exhibit/controller/handle_event.py keypress $rU &");
        exit;
    }

    # ----------------------------------------
    # CANCEL — participant hung up before
    # the call was fully connected
    # ----------------------------------------
    if (is_method("CANCEL")) {
        xlog("L_INFO", "CANCEL — hung up before connection\n");
        t_reply("200", "OK");
        exec_cmd("python3 /home/pi/exhibit/controller/handle_event.py call_ended &");
        exit;
    }

    # ----------------------------------------
    # BYE — participant hung up during a call
    # ----------------------------------------
    if (is_method("BYE")) {
        xlog("L_INFO", "BYE — call ended\n");
        t_reply("200", "OK");
        exec_cmd("python3 /home/pi/exhibit/controller/handle_event.py call_ended &");
        exit;
    }

    # ----------------------------------------
    # OPTIONS — phone keepalive pings
    # ----------------------------------------
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Anything else — decline politely
    xlog("L_WARN", "Unhandled method $rm from $si\n");
    sl_send_reply("501", "Not Implemented");
}

onreply_route {
    xlog("L_DEBUG", "SIP reply: $rs $rr\n");
}

# Backup hangup detection — fires when a tracked dialog ends
# Covers edge cases where BYE is missed
event_route[dialog:end] {
    xlog("L_INFO", "Dialog ended — sending call_ended\n");
    exec_cmd("python3 /home/pi/exhibit/controller/handle_event.py call_ended &");
}