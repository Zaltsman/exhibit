#!KAMAILIO

# -------------------------------------------------------
# Art Exhibit SIP Server Configuration
# Kamailio version: 6.0.1
#
# Architecture:
# - Pi eth0: 192.168.10.1 (switch network)
# - Phone: 192.168.10.2 (switch network)
# - Audio: via SIP/RTP — baresip streams to phone handset
# - Kamailio handles: registration, call routing to baresip
# - Python (sip_monitor.py) handles: video playback via tcpdump
#
# Event flow:
# Phone dials number → Kamailio routes to baresip → baresip answers
# sip_monitor.py detects INVITE via tcpdump → plays video
# Phone hangs up → sip_monitor.py detects BYE → stops video
# -------------------------------------------------------

listen=udp:192.168.10.1:5060
listen=tcp:192.168.10.1:5060

memdbg=5
memlog=5
log_facility=LOG_LOCAL0
children=4

# ------------------
# Module loading
# ------------------

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "jsonrpcs.so"
loadmodule "ctl.so"

# ------------------
# Module settings
# ------------------

modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "default_expires", 3600)

modparam("usrloc", "db_mode", 0)

modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# ------------------
# Main routing logic
# ------------------

request_route {

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("1511", "7")) {
        xlog("L_WARN", "Dropped malformed SIP from $si:$sp\n");
        exit;
    }

    if ($si != "192.168.10.2" && $si != "192.168.10.1" && $si != "127.0.0.1") {
        xlog("L_WARN", "Rejected SIP from unknown source $si\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # ----------------------------------------
    # In-dialog requests (ACK, BYE, re-INVITE)
    # Must be handled before new INVITE logic
    # ----------------------------------------
    if (has_totag()) {
        if (loose_route()) {
            t_relay();
            exit;
        }
        if (is_method("ACK")) {
            if (t_check_trans()) {
                t_relay();
            }
            exit;
        }
        sl_send_reply("404", "Not here");
        exit;
    }

    # ----------------------------------------
    # REGISTER — phone registers on boot
    # ----------------------------------------
    if (is_method("REGISTER")) {
        xlog("L_INFO", "Phone registering from $si\n");
        if (!save("location")) {
            xlog("L_ERR", "Failed to save registration\n");
            sl_reply_error();
        }
        exit;
    }

    # ----------------------------------------
    # INVITE — forward to baresip with
    # record_route so ACK flows back through
    # Kamailio correctly
    # ----------------------------------------
    if (is_method("INVITE")) {
        xlog("L_INFO", "INVITE received: $rU\n");
        record_route();
        rewriteuri("sip:exhibit@192.168.10.1:5061");
        t_relay();
        exit;
    }

    # ----------------------------------------
    # CANCEL — hung up before connected
    # ----------------------------------------
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # ----------------------------------------
    # OPTIONS — phone keepalive pings
    # ----------------------------------------
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    xlog("L_WARN", "Unhandled method $rm from $si\n");
    sl_send_reply("501", "Not Implemented");
}

onreply_route {
    xlog("L_DEBUG", "SIP reply: $rs $rr\n");
}