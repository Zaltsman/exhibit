#!KAMAILIO

# -------------------------------------------------------
# Art Exhibit SIP Server Configuration
# Kamailio version: 6.0.1
# Last updated: current session
#
# Architecture:
# - Phone connects to Pi via Ethernet through private switch
# - Pi eth0 IP: 192.168.10.1
# - Phone IP: 192.168.10.2 (assigned when we configure phone)
# - Audio: physical cable from Pi USB audio adapter to phone headset port
# - Kamailio handles: registration, call detection, DTMF keypresses
# - Python handles: video playback based on events from Kamailio
#
# Event flow:
# Phone picks up → Kamailio sends call_started to Python
# Key pressed → Kamailio sends keypress + key number to Python
# Phone hangs up → Kamailio sends call_ended to Python
# Python acts on each event to control mpv and Chromium
# -------------------------------------------------------

# ------------------
# Global parameters
# ------------------

# Only listen on the private switch network (eth0)
# We deliberately do NOT listen on wlan0 (192.168.1.27)
# so the phone system is completely isolated from home WiFi
listen=udp:192.168.10.1:5060
listen=tcp:192.168.10.1:5060

# Memory and logging settings
memdbg=5
memlog=5
log_facility=LOG_LOCAL0

# Number of worker processes
children=4

# ------------------
# Module loading
# Only load what we actually need — keeps startup fast
# and reduces surface area for errors
# ------------------

# Core modules — always needed
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"

# Registration handling
loadmodule "usrloc.so"
loadmodule "registrar.so"

# Text and SIP utilities
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"

# Call state tracking — needed to reliably detect hangup
loadmodule "dialog.so"

# Event API — how Kamailio talks to Python
# Python connects to the evapi socket and receives JSON events
loadmodule "evapi.so"

# Management interfaces
loadmodule "jsonrpcs.so"
loadmodule "ctl.so"

# ------------------
# Module settings
# ------------------

# registrar — how long phone registration stays valid
# 3600 seconds = 1 hour, phone re-registers before expiry
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "default_expires", 3600)

# usrloc — store phone location in memory only
# no database needed for a single phone exhibit
modparam("usrloc", "db_mode", 0)

# tm — SIP transaction timeouts
# fr_timer: how long to wait for a response (30 seconds)
# fr_inv_timer: how long to wait for INVITE response (120 seconds)
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# dialog — track active calls
# We need this to reliably detect when the phone hangs up
modparam("dialog", "enable_stats", 0)

# evapi — the socket Python connects to for receiving events
# Python runs on the same Pi so we use localhost (127.0.0.1)
# Port 8448 is arbitrary — just needs to match what Python connects to
modparam("evapi", "bind_addr", "127.0.0.1:8448")
modparam("evapi", "workers", 1)

# ------------------
# Main routing logic
# This function is called for every SIP message received
# ------------------

request_route {

    # Safety: drop requests forwarded too many times
    # Prevents infinite loops in SIP routing
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Safety: drop malformed SIP messages
    # Protects against badly formatted requests
    if (!sanity_check("1511", "7")) {
        xlog("L_WARN", "Dropped malformed SIP from $si:$sp\n");
        exit;
    }

    # Security: only accept messages from our phone's IP address
    # Since this is a private network with one phone, this is
    # the simplest and most reliable form of authentication
    # Update 192.168.10.2 to match the phone's actual IP
    if ($si != "192.168.10.2") {
        xlog("L_WARN", "Rejected SIP from unknown source $si\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    # Stay in the call path for INVITE so we receive BYE later
    # Without this we would miss the hangup message
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # ----------------------------------------
    # REGISTER — phone announces itself on boot
    # and periodically to stay connected
    # ----------------------------------------
    if (is_method("REGISTER")) {
        xlog("L_INFO", "Phone registering from $si\n");

        # Save the phone's location so we can reach it
        if (!save("location")) {
            xlog("L_ERR", "Failed to save registration\n");
            sl_reply_error();
        }

        xlog("L_INFO", "Phone registered successfully\n");
        exit;
    }

    # ----------------------------------------
    # INVITE — participant picks up the handset
    # ----------------------------------------
    if (is_method("INVITE")) {
        xlog("L_INFO", "Handset picked up — call started\n");

        # Start tracking this call as a dialog
        # so we can detect when it ends via BYE
        dlg_manage();

        # Reply with 200 OK and minimal SDP
        # The phone needs a valid SDP response to complete call setup
        # even though we are not routing audio through SIP
        # Audio goes through the physical cable instead
       	t_reply("200", "OK");

        # Notify Python that handset was picked up
        # Python can use this to show a "pick a number" prompt if needed
        evapi_async_relay("{\"event\":\"call_started\"}");
        exit;
    }

    # ----------------------------------------
    # BYE — participant hangs up the handset
    # ----------------------------------------
    if (is_method("BYE")) {
        xlog("L_INFO", "Handset hung up — call ended\n");

        # Confirm the hangup to the phone
        t_reply("200", "OK");

        # Notify Python to stop video and return to idle screen
        evapi_async_relay("{\"event\":\"call_ended\"}");
        exit;
    }

    # ----------------------------------------
    # INFO — a key was pressed on the keypad
    # The phone sends the key in the message body
    # Format: "Signal=1\r\nDuration=160\r\n"
    # We extract just the key number and send to Python
    # ----------------------------------------
    if (is_method("INFO")) {
        xlog("L_INFO", "Key pressed — body: $rb\n");

        # Acknowledge the keypress to the phone
        t_reply("200", "OK");

        # Parse the key from the message body
        # $(rb{s.select,0,=}) gets everything before the first =
        # $(rb{s.select,1,=}{s.strip,0}{s.trim}) gets the value after =
        if ($(rb{s.select,0,=}) =~ "Signal") {
            $var(key) = $(rb{s.select,1,=}{s.strip,0}{s.trim});
            xlog("L_INFO", "Sending keypress event for key: $var(key)\n");
            evapi_async_relay("{\"event\":\"keypress\",\"key\":\"$var(key)\"}");
        }
        exit;
    }

    # ----------------------------------------
    # OPTIONS — phone sends these as keepalive pings
    # Just reply OK to confirm we are still running
    # ----------------------------------------
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Anything else we don't handle — decline politely
    xlog("L_WARN", "Unhandled method $rm from $si\n");
    sl_send_reply("501", "Not Implemented");
}

# ----------------------------------------
# Reply route — called for SIP responses
# We just log them for debugging purposes
# ----------------------------------------
onreply_route {
    xlog("L_DEBUG", "SIP reply received: $rs $rr\n");
}

# ----------------------------------------
# Dialog end event — backup hangup detection
# Called when a tracked dialog expires or ends
# Provides a safety net in case BYE is missed
# ----------------------------------------
event_route[dialog:end] {
    xlog("L_INFO", "Dialog ended — sending call_ended to Python\n");
    evapi_async_relay("{\"event\":\"call_ended\"}");
}